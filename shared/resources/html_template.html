<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    body {
        font-family: 'SansSerif', 'Helvetica', 'Arial', sans-serif;
        font-size: 9pt;
        margin: 4px;
        padding: 0;
        overflow-y: auto;
        overflow-x: hidden;
        word-wrap: break-word;
    }
    a {
        color: #0000EE;
    }
</style>
</head>
<body>
<div id="content"></div>
<script>
function setup(htmlComponent) {
    htmlComponent.addEventListener("DataChanged", function(event) {
        var data = htmlComponent.Data;
        if (data !== null && data !== undefined) {
            document.getElementById("content").innerHTML = data;
            window.scrollTo(0, document.body.scrollHeight);
        } else {
            document.getElementById("content").innerHTML = "";
        }
    });
    // Initial render
    if (htmlComponent.Data !== null && htmlComponent.Data !== undefined) {
        document.getElementById("content").innerHTML = htmlComponent.Data;
    }
}
</script>
</body>
</html>
